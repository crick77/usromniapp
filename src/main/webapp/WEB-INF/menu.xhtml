<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="jakarta.faces.core"
    xmlns:h="jakarta.faces.html"
    xmlns:ui="jakarta.faces.facelets"
    xmlns:p="primefaces"
    xmlns:pv="http://primefaces.org/verona">

    <div class="layout-menu-wrapper">
        <div class="layout-menu-container">
            <h:form id="menuForm">
                <pv:menu widgetVar="VeronaMenuWidget">
                    <p:menuitem id="m_index" value="Home" icon="pi pi-fw pi-home" outcome="/secure/index"/>
                    <p:submenu id="m_assegnazioni" label="Assegnazioni">
                        <p:menuitem id="m_assegna" value="Da assegnare" icon="pi pi-fw pi-objects-column" outcome="/secure/assegna" />
                        <p:menuitem id="m_assegnate" value="Assegnate" icon="pi pi-fw pi-objects-column" outcome="/secure/assegnate" />
                    </p:submenu>
                    <p:submenu id="m_procedimento" label="Procedimento" icon="pi pi-fw pi-objects-column">                        
                        <p:menuitem id="m_apri" value="Nuovo" icon="pi pi-fw pi-file-plus" outcome="/secure/nuovoprocedimento"/>                        
                        <p:menuitem id="m_incarico" value="In carico" icon="pi pi-fw pi-wrench" outcome="/secure/incarico"/>
                    </p:submenu>                                        
                    <p:menuitem id="m_uscita" value="Uscita" icon="pi pi-fw pi-sign-out" outcome="/secure/uscita"/>
                </pv:menu>
            </h:form>
        </div>
    </div>
</ui:composition>
