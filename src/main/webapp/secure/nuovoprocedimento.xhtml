<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Apri procedimento</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{nuovoProcedimentoController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <div class="grid">
                <div class="col-12">
                    <div class="card">
                        <div class="grid">
                            <div class="col-2">
                                <p:outputLabel for="@next" value="Selezionare la tipologia di procedimento" />
                                <p:selectOneListbox id="tipiProcedimento" value="#{nuovoProcedimentoController.tipoProcedimento}" converter="lTipoProcConverter" style="width: 100%">
                                    <p:ajax process="@this" update="@this apri" />
                                    <f:selectItems value="#{nuovoProcedimentoController.tipiProcedimento}" var="tp" itemLabel="#{tp.tipoProc}" itemValue="#{tp}" />
                                </p:selectOneListbox>
                            </div>
                            <div class="col-10" />
                            <div class="col-2">
                                <p:commandButton id="apri" icon="pi pi-plus" value="Crea nuovo" action="#{nuovoProcedimentoController.apri()}" ajax="false" disabled="#{empty nuovoProcedimentoController.tipoProcedimento}" styleClass="ui-button-info" style="width: 100%"/>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </h:form>       
    </ui:define>

</ui:composition>
