<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Apri procedimento</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{nuovoProcedimentoController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:selectOneMenu id="tipiProcedimento" value="#{nuovoProcedimentoController.tipoProcedimento}" converter="lTipoProcConverter" hideNoSelectionOption="#{not empty nuovoProcedimentoController.tipoProcedimento}">
                <p:ajax process="@this" update="@this apri" />
                <f:selectItem itemLabel="Selezionare un procedimento..." itemValue="#{null}" noSelectionOption="true"/>
                <f:selectItems value="#{nuovoProcedimentoController.tipiProcedimento}" var="tp" itemLabel="#{tp.tipoProc}" itemValue="#{tp}" />
            </p:selectOneMenu>
            <p:commandButton id="apri" value="Apri" action="#{nuovoProcedimentoController.apri()}" ajax="false" disabled="#{empty nuovoProcedimentoController.tipoProcedimento}"/>
        </h:form>       
    </ui:define>

</ui:composition>
