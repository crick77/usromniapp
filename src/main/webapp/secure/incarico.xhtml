<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Lavorazione</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{inCaricoController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:growl id="msgs" showDetail="true"/>

            <div class="grid">
                <div class="col-12">
                    <div class="card">
                        <h5>Assegnazioni</h5>
                        <div class="ui-fluid formgrid grid">
                            <p:dataTable id="assegnazioni" widgetVar="wvAssegnazioni" var="ass" value="#{lavinCaricoControllersegnazioni}" size="small">
                                <p:column headerText="Procedimento">
                                    #{lavorainCaricoControllerificatProcedimento(ass.idTipoProc).tipoProc}
                                </p:column>

                                <p:column headerText="N.">
                                    #{ass.codice}
                                </p:column>

                                <p:column headerText="Richiedente">
                                    #{ass.richiedente}
                                </p:column>

                                <p:column headerText="Indirizzo">
                                    #{ass.indirizzo}
                                </p:column>

                                <p:column headerText="Codice Com.">
                                    #{ass.codiceCom}
                                </p:column>
                                
                                <p:column style="width:6rem">                                    
                                    Bottoni
                                </p:column>                                                                
                            </p:dataTable>
                        </div>                        
                    </div>
                    <div class="card">
                        <div class="grid mt-3">
                            <div class="col-12">
                                <p:commandButton value="Salva" icon="pi pi-save" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </h:form>       
    </ui:define>

</ui:composition>
