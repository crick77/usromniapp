<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Procedure assegnate</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{assegnateController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:growl id="msgs" showDetail="true"/>

            <div class="grid">
                <div class="col-12">
                    <div class="card">                        
                        <div class="grid">
                            <div class="col-2">
                                <p:selectOneMenu id="tipiproc" value="#{assegnateController.tipoProcedimentoSelezionato}" hideNoSelectionOption="#{not empty assegnateController.tipoProcedimentoSelezionato}" converter="lTipoProcConverter" style="width: 100%">
                                    <p:ajax update="@this procedimenti" listener="#{assegnateController.aggiornaProcedimenti()}" />
                                    <f:selectItem itemLabel="Selezionare un tipo di procedura..." itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{assegnateController.tipiProcedimento}" var="tp" itemValue="#{tp}" itemLabel="#{tp.tipoProc}" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="formgrid grid">
                            <p:dataTable id="procedimenti" widgetVar="wvProcedimenti" var="proc" value="#{assegnateController.procedimenti}" size="small" emptyMessage="Nessuna procedura assegnata o corrispondete ai criteri di ricerca impostati."
                                         rowKey="#{proc.idProc}" stripedRows="true" paginatorPosition="bottom" style="margin-bottom: 0" paginator="true" rows="10" selectionPageOnly="false" rowsPerPageTemplate="5,10,{ShowAll|'Tutti'}"
                                         paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                         selectionRowMode="none" styleClass="ui-datatable-sm" currentPageReportTemplate="{startRecord}-{endRecord} di {totalRecords} procedure" filteredValue="#{assegnateController.procedimentiFiltrati}">
                                
                                <f:facet name="header">
                                    <div class="flex align-items-center justify-content-between">
                                        <span>ELENCO PROCEDIMENTI ASSEGNATI</span>
                                        <div>
                                            <p:inputText id="globalFilter" onkeyup="PrimeFaces.debounce(() => PF('wvProcedimenti').filter())" style="width:20rem"
                                                         placeholder="Ricerca globale..." />
                                        </div>
                                    </div>
                                </f:facet>
                                                                
                                <p:column headerText="PROCEDIMENTO" width="7%">
                                    #{assegnateController.decodificaProcedimento(proc.idTipoProc).tipoProc}
                                </p:column>

                                <p:column headerText="N." filterBy="#{proc.codice}" filterMatchMode="contains" width="5%">
                                    #{proc.codice}
                                </p:column>

                                <p:column headerText="RICHIEDENTE" filterBy="#{proc.richiedente}" filterMatchMode="contains">
                                    #{proc.richiedente}
                                </p:column>

                                <p:column headerText="INDIRIZZO" filterBy="#{proc.indirizzo}" filterMatchMode="contains">
                                    #{proc.indirizzo}
                                </p:column>

                                <p:column headerText="COMUNE" filterBy="#{proc.comune}" filterMatchMode="contains">
                                    #{proc.comune}
                                </p:column>

                                <p:column headerText="ASSEGNANTE" filterBy="#{proc.assegnante}" filterMatchMode="contains">                                    
                                    #{proc.assegnante}
                                </p:column>                                                                

                                <p:column headerText="ASSEGNATARI">   
                                    <ul>
                                        <ui:repeat value="#{assegnateController.splitAssegnatari(proc.assegnatari)}" var="ass" rendered="#{not empty proc.assegnatari}">
                                            <li>#{ass}</li>
                                        </ui:repeat>
                                    </ul>
                                </p:column>                                                                

                                <p:column width="10%">                                    
                                    <p:commandButton id="assegnaButton" value="Modifica Assegnazioni" icon="pi pi-pencil" action="#{assegnateController.preparaAssegnazione(proc)}" update=":form:utenti" oncomplete="PF('wvUtentiDialog').show();"/>
                                </p:column>                                                                
                            </p:dataTable>
                        </div>                                                                             
                    </div>
                </div>
            </div>

            <p:dialog id="utentiDialog" widgetVar="wvUtentiDialog" width="70%" header="Utenti" modal="true">
                <div class="col-12">
                    <p:pickList id="utenti" value="#{assegnateController.utenti}" var="u" itemValue="#{u}" itemLabel="#{u.nomeUtente} [Ruolo #{u.ruolo}]"
                                showSourceControls="false" showTargetControls="false" showCheckbox="true"
                                showSourceFilter="true" showTargetFilter="true"
                                sourceFilterPlaceholder="Filtra utenti disponibili"
                                targetFilterPlaceholder="Filtra utenti selezionati"
                                filterMatchMode="contains" converter="#{utenteRuoloConverter}" responsive="true">
                        <f:facet name="sourceCaption">Disponibili</f:facet>
                        <f:facet name="targetCaption">Selezionati</f:facet> 
                    </p:pickList>                    
                </div>
                <div class="col-12">
                    <p:commandButton value="Salva" icon="pi pi-save" action="#{assegnateController.salva()}" update=":form:msgs :form:procedimenti" />
                </div>
            </p:dialog>                        
        </h:form>       
    </ui:define>

</ui:composition>
