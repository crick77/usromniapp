<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Procedure assegnate</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{assegnateController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:growl id="msgs" showDetail="true"/>

            <div class="grid">
                <div class="col-12">
                    <div class="card">
                        PRATICHE ASSEGNATE
                        <div class="grid mt-3">
                            <div class="col-12">
                                <p:outputLabel for="tipiproc" value="Tipo procedura: "/>
                                <p:selectOneMenu id="tipiproc" value="#{assegnateController.tipoProcedimentoSelezionato}" hideNoSelectionOption="#{not empty assegnateController.tipoProcedimentoSelezionato}" converter="lTipoProcConverter">
                                    <p:ajax update="@this procedimenti" listener="#{assegnateController.aggiornaProcedimenti()}" />
                                    <f:selectItem itemLabel="Selezionare..." itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{assegnateController.tipiProcedimento}" var="tp" itemValue="#{tp}" itemLabel="#{tp.tipoProc}" />
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="ui-fluid formgrid grid">
                            <p:dataTable id="procedimenti" widgetVar="wvProcedimenti" var="proc" value="#{assegnateController.procedimenti}" size="small" emptyMessage="Nessuna procedura assegnata."
                                         rowKey="#{proc.idProc}" stripedRows="true" paginatorPosition="bottom" style="margin-bottom: 0" paginator="true" rows="5" selectionPageOnly="false"
                                         selectionRowMode="none" cellNavigation="true" styleClass="ui-datatable-sm">                                
                                <p:column headerText="Procedimento">
                                    #{assegnateController.decodificatProcedimento(proc.idTipoProc).tipoProc}
                                </p:column>

                                <p:column headerText="N.">
                                    #{proc.codice}
                                </p:column>

                                <p:column headerText="Richiedente">
                                    #{proc.richiedente}
                                </p:column>

                                <p:column headerText="Indirizzo">
                                    #{proc.indirizzo}
                                </p:column>

                                <p:column headerText="Codice Com.">
                                    #{proc.comune}
                                </p:column>

                                <p:column headerText="Assegnante">                                    
                                    #{proc.assegnante}
                                </p:column>                                                                
                                
                                <p:column headerText="Utenti Assegnatari">   
                                    <ul>
                                        <ui:repeat value="#{assegnateController.splitAssegnatari(proc.assegnatari)}" var="ass">
                                            <li>#{ass}</li>
                                        </ui:repeat>
                                    </ul>
                                </p:column>                                                                
                                                                                                                                                            
                                <p:column>                                    
                                    <p:commandButton id="assegnaButton" value="Modifica Assegnazioni" icon="pi pi-pencil" action="#{assegnateController.preparaAssegnazione(proc)}" update=":form:utenti" oncomplete="PF('wvUtentiDialog').show();"/>
                                </p:column>                                                                
                            </p:dataTable>
                        </div>                        
                        <div class="card">
                            <div class="grid mt-3">
                                <div class="col-12">
                                    
                                </div>
                            </div>
                        </div>                                
                    </div>
                </div>
            </div>

            <p:dialog id="utentiDialog" widgetVar="wvUtentiDialog" width="70%" header="Utenti" modal="true">
                <div class="col-12">
                    <p:pickList id="utenti" value="#{assegnateController.utenti}" var="u" itemValue="#{u}" itemLabel="#{u.nomeUtente} [Ruolo #{u.ruolo}]"
                                showSourceControls="false" showTargetControls="false" showCheckbox="true"
                                showSourceFilter="true" showTargetFilter="true"
                                sourceFilterPlaceholder="Filtra utenti disponibili"
                                targetFilterPlaceholder="Filtra utenti selezionati"
                                filterMatchMode="contains" converter="#{utenteRuoloConverter}" responsive="true">
                        <f:facet name="sourceCaption">Disponibili</f:facet>
                        <f:facet name="targetCaption">Selezionati</f:facet> 
                    </p:pickList>                    
                </div>
                <div class="col-12">
                    <p:commandButton value="Salva" icon="pi pi-save" action="#{assegnateController.salva()}" update=":form:msgs :form:procedimenti" />
                </div>
            </p:dialog>                        
        </h:form>       
    </ui:define>

</ui:composition>
