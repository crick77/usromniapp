<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Procedure da assegnare</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{assegnaController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:growl id="msgs" showDetail="true"/>

            <div class="grid">
                <div class="col-12">
                    <div class="card">
                        <div class="grid mt-3">
                            <div class="col-12">
                                <p:outputLabel for="tipiproc" value="Tipo procedura: "/>
                                <p:selectOneMenu id="tipiproc" value="#{assegnaController.tipoProcedimentoSelezionato}" hideNoSelectionOption="#{not empty assegnaController.tipoProcedimentoSelezionato}" converter="lTipoProcConverter">
                                    <p:ajax update="@this procedimenti" listener="#{assegnaController.aggiornaProcedimenti()}" />
                                    <f:selectItem itemLabel="Selezionare..." itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{assegnaController.tipiProcedimento}" var="tp" itemValue="#{tp}" itemLabel="#{tp.tipoProc}" />
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="ui-fluid formgrid grid">                            
                            <p:dataTable id="procedimenti" widgetVar="wvProcedimenti" var="proc" value="#{assegnaController.procedimenti}" size="small" emptyMessage="Nessuna procedura da assegnare."
                                         selection="#{assegnaController.procedimentiSelezionati}" rowKey="#{proc.idProc}" stripedRows="true" paginatorPosition="bottom"
                                         style="margin-bottom: 0" paginator="true" rows="5" selectionPageOnly="false" selectionRowMode="none" cellNavigation="true" styleClass="ui-datatable-sm">
                                <p:ajax event="rowSelectCheckbox" update=":form:assegnaButton" />
                                <p:ajax event="rowUnselectCheckbox" update=":form:assegnaButton" />
                                <p:ajax event="toggleSelect" update=":form:assegnaButton" />
                                
                                <p:column selectionBox="true" style="width:16px;text-align:center"/>                                
                                <p:column headerText="Procedimento">
                                    #{assegnaController.decodificatProcedimento(proc.idTipoProc).tipoProc}
                                </p:column>

                                <p:column headerText="N.">
                                    #{proc.codice}
                                </p:column>

                                <p:column headerText="Richiedente">
                                    #{proc.richiedente}
                                </p:column>

                                <p:column headerText="Indirizzo">
                                    #{proc.indirizzo}
                                </p:column>

                                <p:column headerText="Codice Com.">
                                    #{proc.codiceCom}
                                </p:column>

                                <p:column style="width:6rem">                                    
                                    Bottoni
                                </p:column>                                                                
                            </p:dataTable>
                        </div>                        
                        <div class="card">
                            <div class="grid mt-3">
                                <div class="col-12">
                                    <p:commandButton id="assegnaButton" value="Assegna" icon="pi pi-save" action="#{assegnaController.preparaAssegnazione()}" oncomplete="PF('wvUtentiDialog').show();" update="utentiDialog"/>
                                </div>
                            </div>
                        </div>                                
                    </div>
                </div>
            </div>

            <p:dialog id="utentiDialog" widgetVar="wvUtentiDialog" width="70%" header="Utenti" modal="true">
                <div class="col-12">
                    <p:pickList id="utenti" value="#{assegnaController.utenti}" var="u" itemValue="#{u}" itemLabel="#{u.nomeUtente} [Ruolo #{u.ruolo}]"
                                showSourceControls="false" showTargetControls="false" showCheckbox="true"
                                showSourceFilter="true" showTargetFilter="true"
                                sourceFilterPlaceholder="Filtra utenti disponibili"
                                targetFilterPlaceholder="Filtra utenti selezionati"
                                filterMatchMode="contains" converter="#{utenteRuoloConverter}" responsive="true">
                        <f:facet name="sourceCaption">Disponibili</f:facet>
                        <f:facet name="targetCaption">Selezionati</f:facet> 
                    </p:pickList>                    
                </div>
                <div class="col-12">
                    <p:commandButton value="Salva" icon="pi pi-save" action="#{assegnaController.salva()}" update=":form:msgs :form:procedimenti" />
                </div>
            </p:dialog>                        
        </h:form>       
    </ui:define>

</ui:composition>
