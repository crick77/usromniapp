<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Autorizzazzioni Tipi Procedura</ui:define>
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{tipiProcAuthController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:growl id="msgs" showDetail="true"/>

            <div class="grid">
                <div class="col-12">
                    <div class="card">
                        <div class="grid">
                            <div class="col-2">
                                <p:selectOneMenu id="tipiproc" value="#{tipiProcAuthController.tipoProcedimentoSelezionato}" hideNoSelectionOption="#{not empty tipiProcAuthController.tipoProcedimentoSelezionato}" converter="lTipoProcConverter" style="width: 100%">
                                    <p:ajax update="@this procass" listener="#{tipiProcAuthController.aggiornaProcAss()}" />
                                    <f:selectItem itemLabel="Selezionare..." itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{tipiProcAuthController.tipiProcedimento}" var="tp" itemValue="#{tp}" itemLabel="#{tp.tipoProc}" />
                                </p:selectOneMenu>
                            </div>
                        </div>
                        <div class="ui-fluid formgrid grid">                            
                            <p:dataTable id="procass" widgetVar="vwProcass" var="pa" value="#{tipiProcAuthController.tipiProcAss}" size="small" emptyMessage="Nessuna autorizzazione per il tipo procedura selezionato."
                                         rowKey="#{pa.idTipoProcAss}" stripedRows="true" paginatorPosition="bottom" lazy="true" styleClass="ui-datatable-sm" showGridlines="true"
                                         style="margin-bottom: 0" paginator="true" rows="10" selectionPageOnly="false" rowsPerPageTemplate="5,10,{ShowAll|'Tutti'}"
                                         paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                         selectionRowMode="none" currentPageReportTemplate="{startRecord}-{endRecord} di {totalRecords} elementi">
                                <f:facet name="header">
                                    <div class="flex align-items-center justify-content-between">
                                        <span>AUTORIZZAZIONI ATTIVE PER #{tipiProcAuthController.tipoProcedimentoSelezionato.tipoProc}</span>
                                        <div>
                                            <p:inputText id="globalFilter" onkeyup="PrimeFaces.debounce(() => PF('vwProcass').filter())" style="width:20rem"
                                                         placeholder="Ricerca globale..." />
                                        </div>
                                    </div>
                                </f:facet>
                                <p:column headerText="UTENTE" filterBy="#{pa.nomeUtente}" filterMatchMode="contains" style="background-color: lightcyan">
                                    #{pa.nomeUtente}
                                </p:column>

                                <p:column headerText="RUOLO" filterBy="#{pa.ruolo}" filterMatchMode="contains" style="background-color: lightcyan">
                                    #{pa.ruolo}
                                </p:column>

                                <p:column headerText="UFFICIO" filterBy="#{pa.ufficio}" filterMatchMode="contains" style="background-color: lightgoldenrodyellow">
                                    #{pa.ufficio}
                                </p:column>

                                <p:column headerText="ASSEGNANTE" filterBy="#{pa.assegnante}" filterMatchMode="contains" style="background-color: lavender">
                                    #{pa.assegnante}
                                </p:column>

                                <p:column headerText="LETTURA" style="background-color: #f0d1d0; text-align: center" width="6%">
                                    <ui:fragment rendered="#{tipiProcAuthController.contains(pa.autorizzazioni, 'L')}">
                                        <i class="pi pi-eye" />
                                    </ui:fragment>
                                </p:column>

                                <p:column headerText="MODIFICA" style="background-color: #f0d1d0; text-align: center" width="6%">
                                    <ui:fragment rendered="#{tipiProcAuthController.contains(pa.autorizzazioni, 'M')}">
                                        <i class="pi pi-pencil" />
                                    </ui:fragment>
                                </p:column>

                                <p:column headerText="ASSEGNAZIONE" style="background-color: #f0d1d0; text-align: center" width="6%">
                                    <ui:fragment rendered="#{tipiProcAuthController.contains(pa.autorizzazioni, 'A')}">
                                        <i class="pi pi-arrow-right-arrow-left" />
                                    </ui:fragment>
                                </p:column>

                                <p:column headerText="DIVIETO" style="background-color: #f0d1d0; text-align: center" width="6%">
                                    <ui:fragment rendered="#{tipiProcAuthController.contains(pa.autorizzazioni, 'X')}">
                                        <i class="pi pi-ban" />
                                    </ui:fragment>
                                </p:column>

                                <p:column headerText="DECORRENZA" width="8%">
                                    <h:outputText value="#{pa.dataAssegnazione}">
                                        <f:convertDateTime pattern="dd-MM-yyyy HH:mm:ss" type="localDateTime" />
                                    </h:outputText>
                                </p:column>

                                <p:column style="width:3rem" styleClass="center">                                    
                                    <p:commandButton id="edit" icon="pi pi-pencil" styleClass="rounded-button ui-button-secondary" />
                                </p:column> 

                                <p:column style="width:3rem" styleClass="center">                                    
                                    <p:commandButton id="delega" icon="pi pi-sitemap" styleClass="rounded-button ui-button-help" action="#{tipiProcAuthController.caricaDeleghe(pa)}" update="form:deleghe" oncomplete="PF('wvDelegheDialog').show();" />
                                </p:column> 
                            </p:dataTable>
                        </div>                        
                        <div class="card">
                            <div class="grid mt-3">
                                <div class="col-12">
                                    <p:commandButton id="assegnaButton" value="Aggiungi" icon="pi pi-plus-circle"/>
                                </div>
                            </div>
                        </div>   

                        <p:dialog id="delegheDialog" widgetVar="wvDelegheDialog" header="DELEGHE" showEffect="fade" modal="true" responsive="true" width="60%">
                            <p:outputPanel class="ui-fluid grid formgrid" id="iterPanel">
                                <div class="field col-12">
                                    <p:dataTable id="deleghe" value="#{tipiProcAuthController.deleghe}" var="d" emptyMessage="Nessuna delega disponibile per l'utente e il tipo procedura selezionato.">
                                        <p:column headerText="DELEGATO" width="15%">
                                            #{tipiProcAuthController.decodeUtente(d.idUtente).nomeUtente}
                                        </p:column>
                                        <p:column headerText="DELEGATO">
                                            #{d.note}
                                        </p:column>
                                    </p:dataTable>
                                </div>
                            </p:outputPanel>
                        </p:dialog>
                    </div>
                </div>
            </div>                               
        </h:form>       
    </ui:define>

</ui:composition>
