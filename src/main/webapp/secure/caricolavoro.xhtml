<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:f="jakarta.faces.core"
                xmlns:h="jakarta.faces.html"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="primefaces"
                xmlns:jsf="jakarta.faces"
                xmlns:fn="jakarta.tags.functions"
                template="/WEB-INF/template.xhtml"
                xmlns:c="jakarta.tags.core"
                xmlns:pe="primefaces.extensions">

    <ui:define name="title">Carichi di lavoro</ui:define>
    
    <ui:define name="head">
        <f:metadata>            
            <f:viewAction action="#{caricoLavoroController.init()}" />
        </f:metadata>        
    </ui:define>

    <ui:define name="content">
        <h:form id="form" enctype="multipart/form-data">
            <p:growl id="msgs" showDetail="true"/>

            <div class="grid">
                <div class="col-12">
                    <div class="card">     
                        <div class="grid">
                            <div class="col-2">
                                <p:selectOneMenu id="tipiproc" value="#{caricoLavoroController.tipoProcedimentoSelezionato}" hideNoSelectionOption="#{not empty caricoLavoroController.tipoProcedimentoSelezionato}" converter="lTipoProcConverter" style="width: 100%">
                                    <p:ajax update="@form" listener="#{caricoLavoroController.ricalcolaCarichi()}" />
                                    <f:selectItem itemLabel="Selezionare un tipo di procedura..." itemValue="#{null}" noSelectionOption="true" />
                                    <f:selectItems value="#{caricoLavoroController.tipiProcedimento}" var="tp" itemValue="#{tp}" itemLabel="#{tp.tipoProc}" />
                                </p:selectOneMenu>
                            </div>                            
                        </div>
                        <div class="formgrid grid">
                            <p:dataTable id="carichi" widgetVar="wvCarichi" var="c" value="#{caricoLavoroController.utenti}" size="small" rendered="#{not empty caricoLavoroController.tipoProcedimentoSelezionato}">
                                <f:facet name="header">
                                    <div class="flex align-items-center justify-content-between">
                                        <span>CARICHI PER UTENTE (TOTALE PRATICHE: #{caricoLavoroController.totalePratiche})</span>                                        
                                    </div>
                                </f:facet>

                                <p:column headerText="UTENTE" width="20%" >                                    
                                    #{caricoLavoroController.decodeUtente(c).nomeUtente}
                                </p:column>

                                <p:column headerText="ASSEGNATE">
                                    <p:progressBar value="#{caricoLavoroController.calcolaPercentuale(caricoLavoroController.caricoLavoroUtente(c).totaleDaIstruire)}" displayOnly="true" labelTemplate="#{caricoLavoroController.caricoLavoroUtente(c).totaleDaIstruire}"/>
                                </p:column>

                                <p:column headerText="ISTRUITE">
                                    <p:progressBar value="#{caricoLavoroController.calcolaPercentuale(caricoLavoroController.caricoLavoroUtente(c).totaleIstruite)}" displayOnly="true" labelTemplate="#{caricoLavoroController.caricoLavoroUtente(c).totaleIstruite}" />
                                </p:column>
                                
                                <p:column headerText="INTEGRATE">
                                    <p:progressBar value="#{caricoLavoroController.calcolaPercentuale(caricoLavoroController.caricoLavoroUtente(c).totaleIntegrate)}" displayOnly="true" labelTemplate="#{caricoLavoroController.caricoLavoroUtente(c).totaleIntegrate}" />
                                </p:column>
                                
                                <p:column headerText="REVISIONE">
                                    <p:progressBar value="#{caricoLavoroController.calcolaPercentuale(caricoLavoroController.caricoLavoroUtente(c).totaleInRevisione)}" displayOnly="true" labelTemplate="#{caricoLavoroController.caricoLavoroUtente(c).totaleInRevisione}" />
                                </p:column>                                

                                <p:column headerText="CARICO COMPLESSIVO" >                                    
                                    <p:progressBar value="#{caricoLavoroController.calcolaPercentuale(caricoLavoroController.caricoLavoroUtente(c).complessivo)}" displayOnly="true" labelTemplate="#{caricoLavoroController.caricoLavoroUtente(c).complessivo}" />
                                </p:column>                                
                                                                                                                                
                                <p:column headerText="DI CUI ALLA FIRMA" width="8%">
                                    #{caricoLavoroController.caricoLavoroUtente(c).totaleAllaFirma}
                                </p:column>                                
                                
                                <p:column headerText="CONCLUSE">
                                    <p:progressBar value="#{caricoLavoroController.calcolaPercentuale(caricoLavoroController.caricoLavoroUtente(c).totaleConcluse)}" displayOnly="true" labelTemplate="#{caricoLavoroController.caricoLavoroUtente(c).totaleConcluse}" />
                                </p:column>
                            </p:dataTable>
                        </div>                        
                    </div>                    
                </div>
            </div>
        </h:form>       
    </ui:define>

</ui:composition>
